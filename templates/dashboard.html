<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Dashboard</title>
    
    <!-- Leaflet Maps -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1><i class="fas fa-map-location-dot"></i> Tracker Dashboard</h1>
                <div class="header-stats">
                    <span class="stat-badge">
                        <i class="fas fa-mobile-alt"></i>
                        Dispositivi: <span id="total-devices">0</span>
                    </span>
                    <span class="stat-badge">
                        <i class="fas fa-signal"></i>
                        Attivi: <span id="active-devices">0</span>
                    </span>
                    <span class="stat-badge">
                        <i class="fas fa-map-pin"></i>
                        Posizioni: <span id="total-locations">0</span>
                    </span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2>Dispositivi</h2>
                    <button id="btn-refresh" class="btn-icon" title="Aggiorna lista">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>

                <!-- Devices List -->
                <div class="devices-list" id="devices-list">
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i> Caricamento...
                    </div>
                </div>

                <!-- Add Device Form -->
                <div class="device-form">
                    <h3>Aggiungi Dispositivo</h3>
                    <form id="form-add-device">
                        <div class="form-group">
                            <label for="input-device-id">ID Dispositivo:</label>
                            <input type="text" id="input-device-id" placeholder="es: phone_001" required>
                        </div>
                        <div class="form-group">
                            <label for="input-device-name">Nome:</label>
                            <input type="text" id="input-device-name" placeholder="es: Mio Telefono" required>
                        </div>
                        <div class="form-group">
                            <label for="input-device-owner">Proprietario:</label>
                            <input type="text" id="input-device-owner" placeholder="es: Mario" required>
                        </div>
                        <button type="submit" class="btn-primary">Aggiungi</button>
                    </form>
                </div>
            </aside>

            <!-- Map Area -->
            <main class="map-container">
                <div id="map"></div>
            </main>

            <!-- Details Panel -->
            <aside class="details-panel">
                <div class="details-header">
                    <h2>Dettagli</h2>
                </div>
                <div id="details-content" class="details-content">
                    <p class="empty-state">Nessun dispositivo selezionato</p>
                </div>
                <div class="history-section">
                    <h3>Storico Posizioni</h3>
                    <div id="location-history" class="location-history">
                        <p class="empty-state">Nessuna posizione registrata</p>
                    </div>
                </div>
            </aside>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Tracker System &copy; 2024 | Ultimo aggiornamento: <span id="last-update">--:--:--</span></p>
        </footer>
    </div>

    <!-- Alert Notification -->
    <div id="alert" class="alert"></div>

    <!-- Scripts -->
    <script src="/static/map.js"></script>
</body>
</html>
